name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm prune --omit=dev
      - name: Package
        run: zip -rq app.zip dist node_modules package.json
      - uses: actions/upload-artifact@v4
        with:
          name: app
          path: app.zip

  deploy-test:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: test
      url: https://debitura-test-mcp.azurewebsites.net/healthz
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app
      - uses: azure/webapps-deploy@v3
        with:
          app-name: debitura-test-mcp
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_TEST }}
          package: app.zip
      - name: Smoke test
        run: |
          sleep 15
          curl -sf --retry 5 --retry-delay 10 --retry-all-errors "https://debitura-test-mcp.azurewebsites.net/healthz"

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-test
    environment:
      name: production
      url: https://mcp.debitura.com/healthz
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app
      - uses: azure/webapps-deploy@v3
        with:
          app-name: debitura-prod-mcp
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PROD }}
          package: app.zip
      - name: Smoke test
        run: |
          sleep 15
          curl -sf --retry 5 --retry-delay 10 --retry-all-errors "https://debitura-prod-mcp.azurewebsites.net/healthz"
